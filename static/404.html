<!DOCTYPE html>
<html lang="bn">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>পেজটি পাওয়া যায়নি | ৪০৪</title>
    <link rel="icon" type="image/svg+xml" href="/static/favicon/dekhahok.svg">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&family=Noto+Sans+Bengali:wght@400;700&display=swap"
        rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', 'Noto Sans Bengali', sans-serif;
            background-color: #F9FBFA;
        }

        .bg-emerald-glow {
            background: radial-gradient(circle at center, rgba(16, 185, 129, 0.08) 0%, transparent 70%);
        }
    </style>
</head>

<body class="min-h-screen flex items-center justify-center p-4 overflow-hidden relative">
    <!-- Background Decoration -->
    <div class="absolute inset-0 bg-emerald-glow pointer-events-none"></div>
    <div class="absolute top-[-10%] left-[-5%] w-64 h-64 bg-emerald-100 rounded-full blur-3xl opacity-20"></div>
    <div class="absolute bottom-[-10%] right-[-5%] w-96 h-96 bg-emerald-200 rounded-full blur-3xl opacity-10"></div>

    <div class="max-w-md w-full text-center relative z-10">
        <!-- Icon Container -->
        <div class="relative inline-block mb-8">
            <div
                class="w-32 h-32 bg-white rounded-[2.5rem] shadow-xl flex items-center justify-center border border-emerald-50 relative overflow-hidden group">
                <div
                    class="absolute inset-0 bg-emerald-50 transform scale-0 group-hover:scale-100 transition-transform duration-500 rounded-full opacity-50">
                </div>
                <i data-lucide="map-pin-off"
                    class="w-16 h-16 text-emerald-600 relative z-10 transition-transform duration-500 group-hover:rotate-12"></i>
            </div>
            <div
                class="absolute -top-4 -right-4 bg-red-500 text-white text-xs font-bold px-3 py-1 rounded-full shadow-lg">
                Error 404</div>
        </div>

        <!-- Text Content -->
        <h1 class="text-4xl font-black text-gray-900 mb-4 tracking-tight">ভুল ঠিকানায় এসেছেন?</h1>
        <p class="text-gray-500 text-lg mb-10 leading-relaxed px-4">
            আপনি যে পেজটি খুঁজছেন তা এখানে নেই অথবা সরিয়ে ফেলা হয়েছে। মূল গন্তব্যে ফিরে যান।
        </p>

        <!-- Navigation Buttons -->
        <div class="flex flex-col sm:flex-row gap-4">
            <a href="/"
                class="flex-1 bg-emerald-600 hover:bg-emerald-700 text-white font-bold py-4 px-8 rounded-2xl shadow-lg shadow-emerald-200 transition-all active:scale-95 flex items-center justify-center gap-2">
                <i data-lucide="home" class="w-5 h-5"></i>
                হোম পেজে ফিরুন
            </a>
            <button onclick="history.back()"
                class="flex-1 bg-white hover:bg-gray-50 text-gray-700 font-bold py-4 px-8 rounded-2xl border-2 border-gray-100 transition-all active:scale-95 flex items-center justify-center gap-2">
                <i data-lucide="arrow-left" class="w-5 h-5"></i>
                পূর্ববর্তী পেজ
            </button>
        </div>

        <!-- Brand Footer -->
        <div class="mt-16 flex items-center justify-center gap-3 opacity-50">
            <img src="/static/assets/dekhahok_logo.svg" alt="DekhaHok" class="w-8 h-8">
            <span class="text-sm font-bold text-gray-400 uppercase tracking-widest">DekhaHok.com</span>
        </div>
    </div>

    <script>
        lucide.createIcons();
    </script>
</body>

</html>
